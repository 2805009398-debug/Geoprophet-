services:
  model-service:
    build:
      context: .
      dockerfile: model-service/Dockerfile
    container_name: geoprophet-model-service
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      MODEL_DEVICE: ${MODEL_DEVICE:-cpu}
      ALLOW_HEURISTIC_FALLBACK: ${ALLOW_HEURISTIC_FALLBACK:-true}
    volumes:
      - ./model-service/models:/app/model-service/models
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: geoprophet-api
    restart: unless-stopped
    depends_on:
      model-service:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      AI_INFERENCE_BASE_URL: ${AI_INFERENCE_BASE_URL:-http://model-service:8000}
    volumes:
      - ./backend/data:/app/backend/data
      - ./backend/uploads:/app/backend/uploads
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000/api/health').then((r)=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: geoprophet-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    container_name: geoprophet-gateway
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
